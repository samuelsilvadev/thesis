{% extends "base.html" %}

{% block title %}Delete Post{% endblock %}

{% block content %}
<h1>Delete "{{ post.title }}"?</h1>
<p>Are you sure you want to delete this post? This action cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <div class="actions">
        <button type="submit" style="color: red;">Yes, delete</button>
        <a href="{% url 'post_detail' post.pk %}"><button type="button">Cancel</button></a>
    </div>
</form>
{% endblock %}
