<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SSR Notes{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        nav { display: flex; gap: 1rem; padding: 1rem; border-bottom: 1px solid #ccc; align-items: center; }
        nav a:first-child { font-weight: bold; margin-right: auto; }
        .container { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        .error { color: red; }
        .note-card { border: 1px solid #ddd; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .note-meta { color: #666; margin: 0.5rem 0; }
        form p { margin: 0.5rem 0; }
        input, textarea { padding: 0.5rem; font-size: 1rem; width: 100%; box-sizing: border-box; }
        button, input[type="submit"] { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
        .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'note_list' %}">SSR Notes</a>
        <a href="{% url 'note_list' %}">Notes</a>
        {% if user.is_authenticated %}
            <a href="{% url 'note_create' %}">New Note</a>
            <span>Hi, {{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="margin:0">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <p class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
