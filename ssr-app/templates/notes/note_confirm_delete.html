{% extends "base.html" %}

{% block title %}Delete Note{% endblock %}

{% block content %}
<h1>Delete "{{ note.title }}"?</h1>
<p>Are you sure you want to delete this note? This action cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <div class="actions">
        <button type="submit" style="color: red;">Yes, delete</button>
        <a href="{% url 'note_detail' note.pk %}"><button type="button">Cancel</button></a>
    </div>
</form>
{% endblock %}
