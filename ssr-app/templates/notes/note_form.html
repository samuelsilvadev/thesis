{% extends "base.html" %}

{% block title %}{{ action }} Note{% endblock %}

{% block content %}
<h1>{{ action }} Note</h1>
{% if form.errors %}
    {% for field, errors in form.errors.items %}
        {% for error in errors %}
            <p class="error">{{ error }}</p>
        {% endfor %}
    {% endfor %}
{% endif %}
<form method="post">
    {% csrf_token %}
    <p><input type="text" name="title" placeholder="Title" value="{{ form.title.value|default:'' }}" required></p>
    <p><textarea name="content" placeholder="Note content" rows="8" required>{{ form.content.value|default:'' }}</textarea></p>
    <p><button type="submit">{{ action }} Note</button></p>
</form>
{% endblock %}
